name: Dockerfile Smoke Check

on:
  push:
    branches: [ main ]
    paths:
      - Dockerfile
  pull_request:
    branches: [ main ]
    paths:
      - Dockerfile
  workflow_dispatch:

jobs:
  smoke-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Perform Git LFS checkout
        run: git lfs checkout

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: tinynav:dockerfile-smoke

      - name: Import check in built image
        run: |
          docker run --rm -i \
            --entrypoint "" \
            -v "$GITHUB_WORKSPACE:/tinynav" \
            -w /tinynav \
            tinynav:dockerfile-smoke \
            bash -lc '
              set -eo pipefail
              source /opt/ros/humble/setup.bash
              source /3rdparty/message_filters_ws/install/local_setup.bash
              python -m py_compile tinynav/core/build_map_node.py
              python -c "import tinynav.core.build_map_node"
              python -c "import tinynav.core.map_node"
              python -c "import tinynav.core.planning_node"
              python -c "import tinynav.core.perception_node"
            '
