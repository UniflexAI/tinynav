# Go2 robot config
# All coordinates in body frame: +x forward, +y left, origin at shape center
robot:
  name: go2

  # Shape: "square" (length x width) or "circle" (radius)
  shape: square
  length: 0.7       # meters, forward direction
  width: 0.3        # meters, lateral direction
  # radius: 0.3     # only used when shape=circle

  # Camera position in body frame (shape center = 0,0)
  camera:
    x: 0.35          # head: half-length forward
    y: 0.0

  # Control center in body frame (shape center = 0,0)
  control_center:
    x: 0.0           # Go2: control center ≈ body center
    y: 0.0

  # Safety dilation radius applied to obstacle map (meters)
  safety_radius: 0.1
